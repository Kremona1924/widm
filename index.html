<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">

<title>Wie is de Mol?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:
    radial-gradient(circle at center,#17351d 0%,#111 45%,#060606 100%);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    color:white;

}

/* groene "spikkels" */
body:before{

content:"";

position:absolute;
inset:0;

background-image:
radial-gradient(#2d7a36 1px,transparent 1px);

background-size:30px 30px;

opacity:.08;

}

/* fingerprint */

body:after{

content:"";

position:absolute;

width:650px;
height:650px;

border-radius:50%;

background:
repeating-radial-gradient(circle,
transparent 0px,
transparent 12px,
rgba(0,255,120,.03) 13px,
rgba(0,255,120,.03) 16px);

opacity:.6;

right:-180px;
bottom:-150px;

transform:rotate(18deg);

}

.card{

position:relative;

z-index:2;

width:min(92vw,470px);

padding:45px 35px;

border-radius:22px;

background:#101010;

border:2px solid #2f8d43;

box-shadow:

0 0 60px rgba(0,255,120,.18),

0 0 12px rgba(0,0,0,.8);

text-align:center;

animation:fade .8s ease;

}

.logo{

font-family:"Special Elite",cursive;

font-size:30px;

letter-spacing:2px;

color:white;

margin-bottom:35px;

opacity:.95;

}

h1{

font-family:"Bebas Neue";

font-size:82px;

line-height:.9;

letter-spacing:3px;

margin-bottom:28px;

}

.green{

color:#5bc24f;

}

.subtitle{

font-family:"Bebas Neue";

letter-spacing:3px;

font-size:26px;

color:#7ddf74;

margin-bottom:10px;

}

.code{

display:inline-block;

background:#ece8dd;

color:black;

padding:10px 30px;

margin:20px 0;

font-family:"Special Elite";

font-size:44px;

letter-spacing:3px;

transform:rotate(-1deg);

box-shadow:0 6px 14px rgba(0,0,0,.45);

}

.bottom{

margin-top:20px;

font-family:"Special Elite";

font-size:28px;

color:#78d56e;

}

.small{

margin-top:18px;

font-family:Arial;

font-size:17px;

opacity:.8;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:none;

}

}

</style>

</head>

<body>

<div class="card">

<div class="logo">DE MOL</div>

<h1 id="title">...</h1>

<div class="subtitle" id="subtitle"></div>

<div class="code" id="codeword" style="display:none;"></div>

<div class="bottom">Succes!</div>

<div class="small">Scan deze pagina niet opnieuw tijdens het spel.</div>

</div>

<script>

const molCode="K7Q9P";

const code=new URLSearchParams(window.location.search).get("code");

const title=document.getElementById("title");
const subtitle=document.getElementById("subtitle");
const codeword=document.getElementById("codeword");

if(!code){

title.innerHTML="ONGELDIGE<br>KAART";

subtitle.innerHTML="Scan de QR-code op je opdrachtkaart.";

}

else if(code===molCode){

title.innerHTML='JIJ BENT<br><span class="green">WEL</span><br>DE MOL!';

subtitle.innerHTML="Het codewoord is";

codeword.innerHTML="LOEMPIAS";

codeword.style.display="inline-block";

}

else{

title.innerHTML='JIJ BENT<br><span class="green">NIET</span><br>DE MOL!';

subtitle.innerHTML="Ontdek het codewoord en ontmasker de Mol.";

}

</script>

</body>
</html>
