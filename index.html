<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wie is de Mol?</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111;
      color: #f5e6c8;
      font-family: Georgia, serif;
      text-align: center;
    }
    .card {
      max-width: 420px;
      padding: 32px;
      border: 2px solid #c9a45c;
      border-radius: 18px;
      background: #1b1b1b;
      box-shadow: 0 0 30px rgba(0,0,0,0.6);
    }
    h1 { font-size: 2.2rem; }
    p { font-size: 1.3rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Even kijken...</h1>
    <p id="text"></p>
  </div>

  <script>
    const molCode = "K7Q9P"; // verander deze naar de code van de mol
    const code = new URLSearchParams(window.location.search).get("code");

    if (!code) {
      document.getElementById("title").textContent = "Geen geldige kaart";
      document.getElementById("text").textContent = "Scan de QR-code op je kaart.";
    } else if (code === molCode) {
      document.getElementById("title").textContent = "Jij bent de Mol.";
      document.getElementById("text").textContent = "Saboteer subtiel. Laat niemand je verdenken.";
    } else {
      document.getElementById("title").textContent = "Jij bent niet de Mol.";
      document.getElementById("text").textContent = "Speel fanatiek mee en probeer de Mol te ontmaskeren.";
    }
  </script>
</body>
</html>
